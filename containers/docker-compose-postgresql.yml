version: "3"
services:
  postgres:
    image: postgres:18
    container_name: db-codebase
    ports:
      - 15432:5432
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql
    networks:
      - dev

volumes:
  pgdata:

networks:
  dev:
    name: codebase-dev
